const SUPABASE_URL = "https://jevidzkmwkrajypzrrrn.supabase.co";

/* ====== Утилиты ====== */
const $ = (s, el = document) => el.querySelector(s);

const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const pad = (n) => String(n).padStart(2, "0");
const fmtDate = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const parseDate = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const MONTHS_GEN = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const WD = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const WD_FULL = ["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
const humanDate = (s) => {
  if (!s) return "";
  const today = fmtDate(new Date());
  const tom = fmtDate(new Date(Date.now() + 864e5));
  if (s === today) return "Сегодня";
  if (s === tom) return "Завтра";
  const d = parseDate(s);
  return `${d.getDate()} ${MONTHS_GEN[d.getMonth()]}`;
};
const hm = (t) => (t ? t.slice(0, 5) : null);

const now0 = new Date();

function mondayOf(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const off = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - off);

/* ====== Данные ====== */
async function loadAll() {

}
function chatKey() { return "lifeos-chat-" + (S.session?.user?.id || "anon"); }
function loadChat() { try { S.chat = JSON.parse(localStorage.getItem(chatKey()) || "[]"); } catch { S.chat = []; } }

/* ====== ИИ ====== */
function buildSystem() {
  const n = new Date();

  return `Ты — AI Director приложения LifeOS. Управляешь календарём, задачами и памятью пользователя через разговор.

СЕЙЧАС: ${WD_FULL[n.getDay()]}, ${n.getDate()} ${MONTHS_GEN[n.getMonth()]} ${n.getFullYear()}, ${pad(n.getHours())}:${pad(n.getMinutes())}.

СОБЫТИЯ: ${JSON.stringify(ev)}
ЗАДАЧИ: ${JSON.stringify(tk)}
ПАМЯТЬ: ${JSON.stringify(mm)}

ОТВЕЧАЙ ТОЛЬКО валидным JSON без markdown-обёрток и пояснений, строго вида:
{"reply":"краткий ответ на русском","actions":[...]}

Доступные actions:
{"type":"create_event","title":"","date":"YYYY-MM-DD","time":"HH:MM"|null,"duration_min":число|null,"location":""|null,"notes":""|null}
{"type":"update_event","id":"","...любые из полей выше"}

ПРАВИЛА:
1. Никогда не удаляй без явного подтверждения: сначала спроси (actions пустой), удаляй только после согласия.
2. Если не хватает даты/времени и нельзя разумно предположить — задай ОДИН уточняющий вопрос.

async function applyActions(actions) {
  if (!Array.isArray(actions)) return [];
  const chips = [];
  const uid = S.session.user.id;
  for (const a of actions) {
    try {
      if (a.type === "create_event" && a.title && a.date) {
        const row = { user_id: uid, title: a.title, date: a.date, time: a.time || null, duration_min: a.duration_min || null, location: a.location || null, notes: a.notes || null };

        if (!error) chips.push({ i: "📅", t: `${a.title} — ${humanDate(a.date)}${a.time ? ", " + a.time : ""}` });

        const f = {};
        for (const k of ["title", "date", "time", "duration_min", "location", "notes"]) if (k in a) f[k] = a[k];
        const { error } = await sb.from("events").update(f).eq("id", a.id);
        if (!error) chips.push({ i: "✏️", t: "Событие изменено" });
      } else if (a.type === "delete_event" && a.id) {
        const ev = S.events.find((e) => e.id === a.id);
        const { error } = await sb.from("events").delete().eq("id", a.id);
        if (!error) chips.push({ i: "🗑", t: `Удалено: ${ev ? ev.title : "событие"}` });
      } else if (a.type === "create_task" && a.title) {
        const row = { user_id: uid, title: a.title, priority: ["high","medium","low"].includes(a.priority) ? a.priority : "medium", due_date: a.due_date || null, notes: a.notes || null };
        const { error } = await sb.from("tasks").insert(row);
        if (!error) chips.push({ i: "☑️", t: `Задача: ${a.title}${a.due_date ? " — до " + humanDate(a.due_date) : ""}` });
      } else if (a.type === "update_task" && a.id) {
        const f = {};
        for (const k of ["title", "priority", "due_date", "notes", "done"]) if (k in a) f[k] = a[k];
        const { error } = await sb.from("tasks").update(f).eq("id", a.id);
        if (!error) chips.push({ i: "✏️", t: "Задача изменена" });
      } else if (a.type === "complete_task" && a.id) {
        const t = S.tasks.find((x) => x.id === a.id);
        const { error } = await sb.from("tasks").update({ done: true }).eq("id", a.id);
        if (!error) chips.push({ i: "✅", t: `Выполнено: ${t ? t.title : "задача"}` });
      } else if (a.type === "delete_task" && a.id) {
        const t = S.tasks.find((x) => x.id === a.id);
        const { error } = await sb.from("tasks").delete().eq("id", a.id);
        if (!error) chips.push({ i: "🗑", t: `Удалено: ${t ? t.title : "задача"}` });
      } else if (a.type === "save_memory" && a.fact) {
        const row = { user_id: uid, fact: a.fact, category: ["person","preference","routine","place","other"].includes(a.category) ? a.category : "other" };
        const { error } = await sb.from("memories").insert(row);
        if (!error) chips.push({ i: "🧠", t: `Запомнил: ${a.fact}` });
      } else if (a.type === "delete_memory" && a.id) {
        const { error } = await sb.from("memories").delete().eq("id", a.id);
        if (!error) chips.push({ i: "🗑", t: "Забыто" });
      }
    } catch (e) { console.error("action fail", a, e); }
  }
  if (chips.length) await loadAll();
  return chips;
}

async function sendMsg(text) {
  const content = (text ?? $("#msg")?.value ?? "").trim();
  if (!content || S.aiBusy) return;
  if ($("#msg")) $("#msg").value = "";
  S.chat.push({ role: "user", text: content });
  saveChat();
  S.aiBusy = true;
  render();
  try {
    const transcript = S.chat.slice(-12).map((m) => (m.role === "user" ? "Пользователь: " : "Директор: ") + m.text).join("\n");
    const prompt = buildSystem() + "\n\nДИАЛОГ:\n" + transcript + "\n\nОтветь на последнее сообщение пользователя. Только JSON.";
    const { data, error } = await sb.functions.invoke("ai-chat", { body: { prompt } });
    if (error) throw new Error(error.message || "Ошибка функции");
    if (data?.error) throw new Error(data.error);
    const raw = data?.text || "";
    let parsed;
    try {
      const c = raw.replace(/```json|```/g, "").trim();
      const s = c.indexOf("{"), e = c.lastIndexOf("}");
      parsed = JSON.parse(s >= 0 && e > s ? c.slice(s, e + 1) : c);
    } catch { parsed = { reply: raw || "Не удалось разобрать ответ, попробуйте ещё раз.", actions: [] }; }
    const chips = await applyActions(parsed.actions);
    S.chat.push({ role: "ai", text: parsed.reply || "Готово.", chips });
  } catch (e) {
    S.chat.push({ role: "ai", text: "Не получилось: " + (e?.message || "ошибка сети") + ". Попробуйте ещё раз.", chips: [] });
  }
  saveChat();
  S.aiBusy = false;
  render();
}

/* ====== Отрисовка ====== */
const app = $("#app");

function render() {
  if (!S.session) { renderAuth(); return; }
  const title = NAV.find((n) => n.id === S.view)?.label || "";
  app.innerHTML = `
    <nav class="sidebar">
      <div class="logo">Life<em>OS</em></div>
      ${NAV.map((n) => `<button data-nav="${n.id}" class="${S.view === n.id ? "on" : ""}"><span class="ic">${n.icon}</span> ${n.label}</button>`).join("")}
      <div style="flex:1"></div>
      <button data-signout style="color:#8E8E93">Выйти</button>
    </nav>
    <div class="main">
      <div class="header">
        <div><h1>${title}</h1>${S.view === "chat" ? '<div class="sub">Просто скажите, что нужно</div>' : ""}${S.view === "memory" ? '<div class="sub">Что LifeOS знает о вас</div>' : ""}</div>
        <button class="signout" data-signout>Выйти</button>
      </div>
      <div class="content" id="content">${renderView()}</div>
      ${S.view === "chat" ? `
      <div class="inputbar">
        <input id="msg" placeholder="Скажите, что сделать…" autocomplete="off">
        <button class="sendbtn" id="send" ${S.aiBusy ? "disabled" : ""}>↑</button>
      </div>` : ""}
      <div class="tabbar">
        ${NAV.map((n) => `<button data-nav="${n.id}" class="${S.view === n.id ? "on" : ""}"><span class="ic">${n.icon}</span>${n.label}</button>`).join("")}
      </div>
    </div>`;
  bindMain();
  if (S.view === "chat") { const c = $("#content"); c.scrollTop = c.scrollHeight; }
  if (S.view === "calendar" && S.calMode === "week") {
    const sc = $(".week-scroll");
    if (sc) sc.scrollTop = Math.max(0, (new Date().getHours() - 8) * 48);
  }
}

function renderView() {
  if (S.view === "dash") return viewDash();
  if (S.view === "chat") return viewChat();
  if (S.view === "calendar") return viewCalendar();
  if (S.view === "tasks") return viewTasks();
  if (S.view === "memory") return viewMemory();
  return "";
}

/* --- Дашборд --- */
function viewDash() {
  const n = new Date();
  const h = n.getHours();
  const greet = h < 5 ? "Доброй ночи" : h < 12 ? "Доброе утро" : h < 18 ? "Добрый день" : "Добрый вечер";
  const today = fmtDate(n);
  const todayEv = S.events.filter((e) => e.date === today).sort((a, b) => (a.time || "99") < (b.time || "99") ? -1 : 1);
  const active = S.tasks.filter((t) => !t.done);
  const dueToday = active.filter((t) => t.due_date === today);
  const overdue = active.filter((t) => t.due_date && t.due_date < today);
  const weekAgo = fmtDate(new Date(Date.now() - 7 * 864e5));
  const doneWeek = S.tasks.filter((t) => t.done && (t.updated_at || "").slice(0, 10) >= weekAgo).length;
  const totalWeek = doneWeek + active.length;
  const pct = totalWeek ? Math.round((doneWeek / totalWeek) * 100) : 0;
  return `
    <div class="dash-greet">${greet}!</div>
    <div class="dash-date">${WD_FULL[n.getDay()][0].toUpperCase() + WD_FULL[n.getDay()].slice(1)}, ${n.getDate()} ${MONTHS_GEN[n.getMonth()]}</div>
    <div class="stat-row">
      <div class="stat"><div class="num">${todayEv.length}</div><div class="lbl">событий сегодня</div></div>
      <div class="stat"><div class="num">${dueToday.length}</div><div class="lbl">задач на сегодня</div></div>
      <div class="stat"><div class="num" style="color:${overdue.length ? "#FF3B30" : "#34C759"}">${overdue.length}</div><div class="lbl">просрочено</div></div>
    </div>
    <div class="card">
      <h3>Расписание на сегодня</h3>
      ${todayEv.length ? todayEv.map((e) => `
        <div class="dash-ev"><div class="tm">${hm(e.time) || "—"}</div><div><div class="tt">${esc(e.title)}</div>${e.location ? `<div class="loc">${esc(e.location)}</div>` : ""}</div></div>`).join("") : '<div class="empty">Свободный день. Хороший повод для важного.</div>'}
    </div>
    <div class="card">
      <h3>Прогресс за неделю</h3>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#8E8E93;margin-bottom:6px"><span>Выполнено ${doneWeek} из ${totalWeek}</span><span>${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <button class="plan-btn" data-plan>✦ Спланируй мой день</button>`;
}

/* --- Чат --- */
function viewChat() {
  let h = "";
  if (!S.chat.length) {
    h += `<div class="bubble ai">Привет! Я ваш AI-директор. Управляю календарём, задачами и помню важное о вас. С чего начнём?</div>
    <div class="suggest">
      ${["Запланируй встречу завтра в 15:00", "Добавь задачу: купить продукты", "Что у меня на этой неделе?"].map((s) => `<button data-suggest="${esc(s)}">${esc(s)}</button>`).join("")}
    </div>`;
  }
  for (const m of S.chat) {
    h += `<div class="bubble ${m.role === "user" ? "user" : "ai"}">${esc(m.text)}</div>`;
    for (const c of m.chips || []) h += `<div class="chip"><span>${c.i}</span><span>${esc(c.t)}</span></div>`;
  }
  if (S.aiBusy) h += `<div class="typing"><span></span><span></span><span></span></div>`;
  return h;
}

/* --- Календарь --- */
function viewCalendar() {
  const seg = `<div class="seg"><button data-mode="week" class="${S.calMode === "week" ? "on" : ""}">Неделя</button><button data-mode="month" class="${S.calMode === "month" ? "on" : ""}">Месяц</button></div>`;
  return S.calMode === "month" ? calMonthView(seg) : calWeekView(seg);
}
function calMonthView(seg) {
  const today = fmtDate(new Date());
  const first = new Date(S.calMonth.y, S.calMonth.m, 1);
  const off = (first.getDay() + 6) % 7;
  const start = new Date(S.calMonth.y, S.calMonth.m, 1 - off);
  const byDate = {};
  for (const e of S.events) (byDate[e.date] = byDate[e.date] || []).push(e);
  let cells = "";
  for (let i = 0; i < 42; i++) {
    const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const k = fmtDate(d);
    const n = (byDate[k] || []).length;
    cells += `<div class="cal-cell ${d.getMonth() === S.calMonth.m ? "" : "out"} ${k === today ? "today" : ""} ${k === S.selectedDay ? "sel" : ""}" data-day="${k}">
      <div class="num">${d.getDate()}</div><div class="dots">${"<i></i>".repeat(Math.min(n, 3))}</div></div>`;
  }
  const dayEv = (byDate[S.selectedDay] || []).sort((a, b) => (a.time || "99") < (b.time || "99") ? -1 : 1);
  const sd = parseDate(S.selectedDay);
  return `
    <div class="cal-head">
      <div class="cal-title">${MONTHS[S.calMonth.m]}<span class="yr">${S.calMonth.y}</span></div>
      ${seg}
      <div class="cal-nav"><button data-cal="-1">‹</button><button class="today-btn" data-cal="0">Сегодня</button><button data-cal="1">›</button></div>
    </div>
    <div class="cal-grid">
      <div class="cal-wd">${WD.map((w) => `<div>${w}</div>`).join("")}</div>
      <div class="cal-days">${cells}</div>
    </div>
    <div class="day-panel">
      <h3>${humanDate(S.selectedDay)}${humanDate(S.selectedDay).length < 8 ? `, ${sd.getDate()} ${MONTHS_GEN[sd.getMonth()]}` : ""}</h3>
      ${dayEv.length ? dayEv.map((e) => `
        <div class="ev-row"><div class="bar"></div><div style="flex:1">
          <div class="t">${esc(e.title)}</div>
          <div class="m">${hm(e.time) || "Весь день"}${e.duration_min ? ` · ${e.duration_min} мин` : ""}${e.location ? ` · ${esc(e.location)}` : ""}</div>
          ${e.notes ? `<div class="m">${esc(e.notes)}</div>` : ""}
        </div></div>`).join("") : '<div class="empty" style="background:#fff;border-radius:12px;padding:18px;text-align:center">Нет событий. Попросите Директора что-нибудь запланировать.</div>'}
    </div>`;
}
function calWeekView(seg) {
  const H0 = 6, H1 = 23, PX = 48;
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(S.weekStart.getFullYear(), S.weekStart.getMonth(), S.weekStart.getDate() + i);
    days.push(d);
  }
  const today = fmtDate(new Date());
  const last = days[6];
  const rangeTitle = `${days[0].getDate()} ${MONTHS_GEN[days[0].getMonth()]} — ${last.getDate()} ${MONTHS_GEN[last.getMonth()]}`;
  let head = `<div class="wd"></div>`;
  for (const d of days) {
    const k = fmtDate(d);
    head += `<div class="wd ${k === today ? "today" : ""}">${WD[(d.getDay() + 6) % 7]}<span class="dnum">${d.getDate()}</span></div>`;
  }
  let hourCol = "";
  for (let h = H0; h <= H1; h++) hourCol += `<div class="hour-lbl" style="height:${PX}px">${pad(h)}:00</div>`;
  let cols = "";
  const n = new Date();
  for (const d of days) {
    const k = fmtDate(d);
    const evs = S.events.filter((e) => e.date === k && e.time);
    let blocks = "";
    for (const e of evs) {
      const [hh, mm] = e.time.split(":").map(Number);
      if (hh > H1) continue;
      const top = Math.max(0, (hh - H0) * PX + (mm / 60) * PX);
      const height = Math.max(24, ((e.duration_min || 60) / 60) * PX - 2);
      blocks += `<div class="wev" style="top:${top}px;height:${height}px" title="${esc(e.title)} ${hm(e.time)}${e.location ? " · " + esc(e.location) : ""}">${esc(e.title)}<div class="wt">${hm(e.time)}</div></div>`;
    }
    let nowLine = "";
    if (k === today && n.getHours() >= H0 && n.getHours() <= H1) {
      nowLine = `<div class="now-line" style="top:${(n.getHours() - H0) * PX + (n.getMinutes() / 60) * PX}px"></div>`;
    }
    cols += `<div class="day-col ${k === today ? "today" : ""}" style="height:${(H1 - H0 + 1) * PX}px">${'<div class="hline"></div>'.repeat(H1 - H0 + 1)}${blocks}${nowLine}</div>`;
  }
  const allDay = S.events.filter((e) => !e.time && days.some((d) => fmtDate(d) === e.date));
  return `
    <div class="cal-head">
      <div class="cal-title">${rangeTitle}</div>
      ${seg}
      <div class="cal-nav"><button data-week="-1">‹</button><button class="today-btn" data-week="0">Сегодня</button><button data-week="1">›</button></div>
    </div>
    ${allDay.length ? `<div class="card" style="padding:10px 14px;margin-bottom:10px"><h3 style="margin-bottom:6px">Весь день</h3>${allDay.map((e) => `<div style="font-size:14px;padding:3px 0">📌 ${esc(e.title)} — ${humanDate(e.date)}</div>`).join("")}</div>` : ""}
    <div class="week-scroll" style="max-height:calc(100dvh - 260px)">
      <div class="week-inner">
        <div class="week-header">${head}</div>
        <div class="week-body"><div class="hour-col">${hourCol}</div>${cols}</div>
      </div>
    </div>`;
}

/* --- Задачи --- */
function viewTasks() {
  const today = fmtDate(new Date());
  const act = S.tasks.filter((t) => !t.done);
  const done = S.tasks.filter((t) => t.done);
  if (!S.tasks.length) return '<div class="empty" style="background:#fff;border-radius:12px;padding:18px;text-align:center">Задач пока нет. Скажите Директору: «добавь задачу…»</div>';
  const row = (t) => `
    <div class="task-row ${t.done ? "done" : ""}">
      <div class="checkbox ${t.done ? "on" : ""}" data-task="${t.id}">${t.done ? "✓" : ""}</div>
      <div style="flex:1">
        <div class="t">${esc(t.title)}</div>
        ${t.done ? "" : `<div class="m">
          <span class="pill" style="background:${prioColor[t.priority] || "#8E8E93"}">${prioLabel[t.priority] || esc(t.priority)}</span>
          ${t.due_date ? `<span class="${t.due_date < today ? "overdue" : ""}">до ${humanDate(t.due_date)}</span>` : ""}
          ${t.notes ? `<span>${esc(t.notes)}</span>` : ""}
        </div>`}
      </div>
    </div>`;
  return act.map(row).join("") + (done.length ? `<div class="section-label">Выполнено</div>` + done.map(row).join("") : "");
}

/* --- Память --- */
function viewMemory() {
  if (!S.memories.length) return '<div class="empty" style="background:#fff;border-radius:12px;padding:18px;text-align:center">Память пуста. Директор запоминает важное сам — или скажите: «запомни, что…»</div>';
  return S.memories.map((m) => `
    <div class="mem-row">
      <div style="flex:1"><div class="f">${esc(m.fact)}</div><div class="c">${catLabel[m.category] || esc(m.category)} · ${(m.created_at || "").slice(0, 10)}</div></div>
      <button class="forget" data-forget="${m.id}">Забыть</button>
    </div>`).join("");
}

/* ====== Авторизация ====== */
function renderAuth() {
  const isLogin = S.authMode === "login";
  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-logo">Life<em>OS</em></div>
      <div class="auth-sub">Ваш личный AI-директор</div>
      <div class="auth-card">
        <input id="email" type="email" placeholder="Email" autocomplete="email">
        <input id="pass" type="password" placeholder="Пароль (минимум 6 символов)" autocomplete="${isLogin ? "current-password" : "new-password"}">
        <div class="auth-error">${esc(S.authError)}</div>
        <button class="btn-primary" id="authbtn" ${S.authBusy ? "disabled" : ""}>${S.authBusy ? "Секунду…" : isLogin ? "Войти" : "Создать аккаунт"}</button>
      </div>
      <div class="auth-switch">${isLogin ? 'Нет аккаунта? <a data-switch>Зарегистрироваться</a>' : 'Уже есть аккаунт? <a data-switch>Войти</a>'}</div>
    </div>`;
  $("#authbtn").onclick = doAuth;
  $("#pass").onkeydown = (e) => { if (e.key === "Enter") doAuth(); };
  $("[data-switch]").onclick = () => { S.authMode = isLogin ? "signup" : "login"; S.authError = ""; renderAuth(); };
}
async function doAuth() {
  const email = $("#email").value.trim();
  const password = $("#pass").value;
  if (!email || password.length < 6) { S.authError = "Введите email и пароль от 6 символов."; renderAuth(); return; }
  S.authBusy = true; S.authError = ""; renderAuth();
  const fn = S.authMode === "login"
    ? sb.auth.signInWithPassword({ email, password })
    : sb.auth.signUp({ email, password });
  const { data, error } = await fn;
  S.authBusy = false;
  if (error) {
    S.authError = /invalid/i.test(error.message) ? "Неверный email или пароль." : error.message;
    renderAuth();
    return;
  }
  if (!data.session) {
    S.authError = "Подтвердите email по ссылке из письма и войдите.";
    S.authMode = "login";
    renderAuth();
  }
}

/* ====== Обработчики ====== */
function bindMain() {
  $$("[data-nav]").forEach((b) => (b.onclick = () => { S.view = b.dataset.nav; render(); }));
  $$("[data-signout]").forEach((b) => (b.onclick = async () => { await sb.auth.signOut(); }));
  const send = $("#send");
  if (send) send.onclick = () => sendMsg();
  const msg = $("#msg");
  if (msg) msg.onkeydown = (e) => { if (e.key === "Enter") sendMsg(); };
  $$("[data-suggest]").forEach((b) => (b.onclick = () => sendMsg(b.dataset.suggest)));
  const plan = $("[data-plan]");
  if (plan) plan.onclick = () => { S.view = "chat"; render(); sendMsg("Спланируй мой день с учётом моих событий и задач"); };
  $$("[data-mode]").forEach((b) => (b.onclick = () => { S.calMode = b.dataset.mode; render(); }));
  $$("[data-cal]").forEach((b) => (b.onclick = () => {
    const v = +b.dataset.cal;
    if (v === 0) { const n = new Date(); S.calMonth = { y: n.getFullYear(), m: n.getMonth() }; S.selectedDay = fmtDate(n); }
    else { const d = new Date(S.calMonth.y, S.calMonth.m + v, 1); S.calMonth = { y: d.getFullYear(), m: d.getMonth() }; }
    render();
  }));
  $$("[data-week]").forEach((b) => (b.onclick = () => {
    const v = +b.dataset.week;
    if (v === 0) S.weekStart = mondayOf(new Date());
    else S.weekStart = new Date(S.weekStart.getFullYear(), S.weekStart.getMonth(), S.weekStart.getDate() + v * 7);
    render();
  }));
  $$("[data-day]").forEach((c) => (c.onclick = () => { S.selectedDay = c.dataset.day; render(); }));
  $$("[data-task]").forEach((c) => (c.onclick = async () => {
    const t = S.tasks.find((x) => x.id === c.dataset.task);
    if (!t) return;
    await sb.from("tasks").update({ done: !t.done }).eq("id", t.id);
    await loadAll();
    render();
  }));
  $$("[data-forget]").forEach((b) => (b.onclick = async () => {
    await sb.from("memories").delete().eq("id", b.dataset.forget);
    await loadAll();
    render();
  }));
}

/* ====== Старт ====== */
sb.auth.onAuthStateChange(async (_event, session) => {
  const had = !!S.session;
  S.session = session;
  if (session && !had) {
    loadChat();
    await loadAll();
  }
  render();
});
(async () => {
  const { data } = await sb.auth.getSession();
  S.session = data.session;
  if (S.session) { loadChat(); await loadAll(); }
  render();
})();
</script>
