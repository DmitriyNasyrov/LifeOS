<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>LifeOS</title>
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeOS">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --card2: rgba(255,255,255,.72);
  --text: #1C1C1E; --text2: #8A8A8E; --text3: #C5C5C7;
  --sep: rgba(60,60,67,.08); --sep2: rgba(60,60,67,.16);
  --accent: #0A84FF; --accent-grad: linear-gradient(180deg,#2E9BFF,#0A84FF);
  --danger: #FF3B30; --green: #34C759; --orange: #FF9500;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --blur-bg: rgba(242,242,247,.82);
  --bubble-ai: #FFFFFF; --fill: rgba(120,120,128,.1); --fill2: rgba(120,120,128,.2);
  --glass: rgba(255,255,255,.52); --glass-strong: rgba(255,255,255,.72);
  --glass-border: rgba(255,255,255,.65); --glass-hi: rgba(255,255,255,.55);
  --glass-shadow: 0 8px 32px rgba(31,38,60,.14);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000; --card: #1C1C1E; --card2: rgba(28,28,30,.72);
    --text: #FFFFFF; --text2: #98989F; --text3: #48484A;
    --sep: rgba(84,84,88,.35); --sep2: rgba(84,84,88,.65);
    --shadow: 0 1px 2px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.35);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --blur-bg: rgba(10,10,10,.8);
    --bubble-ai: #262628; --fill: rgba(120,120,128,.22); --fill2: rgba(120,120,128,.34);
    --glass: rgba(26,26,30,.55); --glass-strong: rgba(36,36,40,.7);
    --glass-border: rgba(255,255,255,.14); --glass-hi: rgba(255,255,255,.12);
    --glass-shadow: 0 8px 32px rgba(0,0,0,.55);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overscroll-behavior: none;
}
body::before {
  content: ""; position: fixed; inset: -15%; z-index: 0; pointer-events: none;
  background:
    radial-gradient(42% 36% at 16% 10%, rgba(10,132,255,.16), transparent 70%),
    radial-gradient(36% 30% at 88% 18%, rgba(191,90,242,.13), transparent 70%),
    radial-gradient(46% 40% at 72% 94%, rgba(48,209,88,.11), transparent 70%);
}
#app { position: relative; z-index: 1; }
button { font-family: inherit; cursor: pointer; color: var(--text); border: none; background: none;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .15s ease; }
button:active { transform: scale(.93); }
input, select, textarea { font-family: inherit; }
.nic { width: 22px; height: 22px; display: block; }
.nic-sm { width: 18px; height: 18px; }

/* ---------- Каркас ---------- */
#app { height: 100dvh; display: flex; overflow: hidden; }
.sidebar { display: none; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.header {
  padding: calc(10px + env(safe-area-inset-top)) 20px 10px;
  background: var(--blur-bg); backdrop-filter: blur(20px) saturate(1.6); -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border-bottom: .5px solid var(--sep2); z-index: 6;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.header h1 { font-size: 27px; font-weight: 800; letter-spacing: -.6px; }
.header .sub { font-size: 13px; color: var(--text2); margin-top: 1px; font-weight: 500; }
.hbtn { background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: .5px solid var(--glass-border); box-shadow: inset 0 1px 0 var(--glass-hi); color: var(--text2); font-size: 13px; font-weight: 600; padding: 7px 12px; border-radius: 20px; }
.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(175px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling: touch; }
.fade-in { animation: fadeUp .35s cubic-bezier(.2,.8,.2,1); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- Авторизация ---------- */
.auth-wrap { margin: auto; width: 100%; max-width: 380px; padding: 24px; animation: fadeUp .5s cubic-bezier(.2,.8,.2,1); }
.auth-icon { width: 84px; height: 84px; border-radius: 20px; margin: 0 auto 16px; display: block; box-shadow: 0 12px 32px rgba(10,132,255,.35); }
.auth-logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; text-align: center; }
.auth-logo em { font-style: normal; background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
.auth-sub { text-align: center; color: var(--text2); font-size: 15px; margin: 4px 0 28px; }
.auth-card { background: var(--card); border-radius: 22px; padding: 22px; box-shadow: var(--shadow); }
.auth-card input {
  width: 100%; border: none; border-radius: 13px; padding: 15px 16px; font-size: 16px;
  margin-bottom: 10px; outline: none; background: var(--fill); color: var(--text);
}
.auth-card input:focus { box-shadow: 0 0 0 2px var(--accent) inset; }
.btn-primary {
  width: 100%; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 700;
  background: var(--accent-grad); color: #fff; margin-top: 4px; box-shadow: 0 6px 16px rgba(10,132,255,.3);
}
.btn-primary:disabled { opacity: .5; }
.auth-switch { text-align: center; margin-top: 16px; font-size: 14.5px; color: var(--text2); }
.auth-switch a { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 600; }
.auth-error { color: var(--danger); font-size: 13.5px; margin: 6px 2px 2px; min-height: 18px; }

/* ---------- Чат ---------- */
.bubble { max-width: 82%; padding: 11px 15px; border-radius: 20px; font-size: 16px; line-height: 1.42; margin-bottom: 8px; white-space: pre-wrap; word-wrap: break-word; }
.bubble.user { background: var(--accent-grad); color: #fff; margin-left: auto; border-bottom-right-radius: 6px; box-shadow: 0 3px 10px rgba(10,132,255,.25); }
.bubble.ai { background: var(--bubble-ai); border-bottom-left-radius: 6px; box-shadow: var(--shadow-sm); }
.chip {
  display: flex; align-items: center; gap: 9px; background: var(--card); border: .5px solid var(--sep2);
  border-radius: 14px; padding: 9px 13px; font-size: 13.5px; font-weight: 500; margin-bottom: 6px; max-width: 82%;
  box-shadow: var(--shadow-sm); animation: fadeUp .3s;
}
.typing { display: inline-flex; gap: 4px; padding: 15px 17px; background: var(--bubble-ai); border-radius: 20px; box-shadow: var(--shadow-sm); }
.typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink { 0%,60%,100%{opacity:.3} 30%{opacity:1} }
.suggest { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.suggest button { border: .5px solid var(--glass-border); background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 18px; padding: 10px 15px; font-size: 14.5px; font-weight: 500; color: var(--accent); box-shadow: inset 0 1px 0 var(--glass-hi); }
.inputbar {
  position: absolute; bottom: calc(84px + env(safe-area-inset-bottom)); left: 0; right: 0; padding: 10px 14px;
  display: flex; gap: 8px; align-items: center;
}
.inputbar input {
  flex: 1; border: .5px solid var(--glass-border); border-radius: 22px; padding: 12px 18px; font-size: 16px;
  background: var(--glass-strong); backdrop-filter: blur(24px) saturate(1.7); -webkit-backdrop-filter: blur(24px) saturate(1.7);
  color: var(--text); outline: none; box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-hi); min-width: 0;
}
.rbtn { width: 44px; height: 44px; border-radius: 50%; font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.sendbtn { color: #fff; background: linear-gradient(135deg, rgba(46,155,255,.92), rgba(10,132,255,.92));
  border: .5px solid rgba(255,255,255,.45); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 6px 18px rgba(10,132,255,.45), inset 0 1px 0 rgba(255,255,255,.5); }
.sendbtn:disabled { opacity: .4; }
.micbtn { background: var(--glass); border: .5px solid var(--glass-border); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  color: var(--text2); box-shadow: inset 0 1px 0 var(--glass-hi); }
.micbtn.rec { background: var(--danger); color: #fff; border-color: transparent; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,59,48,.45); } 50% { box-shadow: 0 0 0 10px rgba(255,59,48,0); } }

/* ---------- Дашборд ---------- */
.dash-greet { font-size: 30px; font-weight: 800; letter-spacing: -.8px; margin: 4px 4px 0; }
.dash-date { color: var(--text2); font-size: 15px; font-weight: 500; margin: 2px 4px 16px; }
.card { background: var(--card2); backdrop-filter: blur(22px) saturate(1.5); -webkit-backdrop-filter: blur(22px) saturate(1.5); border: .5px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow), inset 0 1px 0 var(--glass-hi); }
.card h3 { font-size: 12.5px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat { flex: 1; background: var(--card2); backdrop-filter: blur(22px) saturate(1.5); -webkit-backdrop-filter: blur(22px) saturate(1.5); border: .5px solid var(--glass-border); border-radius: 18px; padding: 14px; box-shadow: var(--shadow), inset 0 1px 0 var(--glass-hi); }
.stat .ico { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; margin-bottom: 9px; color: #fff; }
.stat .ico svg { width: 17px; height: 17px; }
.stat .num { font-size: 24px; font-weight: 800; letter-spacing: -.5px; }
.stat .lbl { font-size: 12px; color: var(--text2); margin-top: 1px; font-weight: 500; }
.progress-track { height: 8px; background: var(--fill); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#30D158,#34C759); border-radius: 4px; transition: width .5s cubic-bezier(.2,.8,.2,1); }
.dash-ev { display: flex; gap: 12px; padding: 10px 0; border-bottom: .5px solid var(--sep); align-items: baseline; }
.dash-ev:last-child { border-bottom: none; padding-bottom: 2px; }
.dash-ev .tm { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 48px; font-variant-numeric: tabular-nums; }
.dash-ev .tt { font-size: 15.5px; font-weight: 600; }
.dash-ev .loc { font-size: 13px; color: var(--text2); margin-top: 1px; }
.rec-row { display: flex; gap: 11px; padding: 9px 0; border-bottom: .5px solid var(--sep); align-items: flex-start; font-size: 14.5px; line-height: 1.35; font-weight: 500; }
.rec-row:last-child { border-bottom: none; padding-bottom: 2px; }
.rec-row .ri { flex-shrink: 0; width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; margin-top: -1px; }
.rec-row .ri svg { width: 14px; height: 14px; }
.plan-btn {
  width: 100%; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 700;
  color: #fff; margin-top: 2px; display: flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, rgba(46,155,255,.92), rgba(10,132,255,.92));
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: .5px solid rgba(255,255,255,.45);
  box-shadow: 0 10px 26px rgba(10,132,255,.42), inset 0 1px 0 rgba(255,255,255,.5);
}
.empty { color: var(--text2); font-size: 14.5px; padding: 12px 2px; }
.empty-card { background: var(--card); border-radius: 16px; padding: 22px; text-align: center; color: var(--text2); font-size: 14.5px; box-shadow: var(--shadow-sm); }
.notif-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.notif-row .txt { font-size: 14.5px; font-weight: 600; }
.notif-row .st { font-size: 12.5px; color: var(--text2); margin-top: 1px; }
.name-row { display: flex; gap: 8px; }
.name-row input { flex: 1; border: none; border-radius: 12px; padding: 12px 14px; font-size: 15px; background: var(--fill); color: var(--text); outline: none; min-width: 0; }
.name-row button { background: var(--accent); color: #fff; border-radius: 12px; padding: 0 16px; font-weight: 700; font-size: 14px; }

/* ---------- Переключатель iOS ---------- */
.switch { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
.switch input { display: none; }
.switch .knob { position: absolute; inset: 0; background: var(--fill2); border-radius: 16px; transition: background .25s; }
.switch .knob::after { content: ""; position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; background: #fff; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,.25); transition: transform .25s cubic-bezier(.2,.8,.2,1); }
.switch input:checked + .knob { background: var(--green); }
.switch input:checked + .knob::after { transform: translateX(20px); }

/* ---------- Календарь: шапка ---------- */
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
.cal-title { font-size: 19px; font-weight: 800; letter-spacing: -.4px; }
.cal-title .yr { color: var(--danger); font-weight: 700; margin-left: 6px; }
.cal-nav { display: flex; gap: 2px; align-items: center; }
.cal-nav button { color: var(--danger); font-size: 24px; width: 38px; height: 38px; border-radius: 50%; }
.cal-nav .today-btn { font-size: 14px; font-weight: 700; width: auto; padding: 0 12px; }
.seg { display: flex; background: var(--glass); backdrop-filter: blur(18px) saturate(1.7); -webkit-backdrop-filter: blur(18px) saturate(1.7); border: .5px solid var(--glass-border); border-radius: 11px; padding: 2px; box-shadow: inset 0 1px 0 var(--glass-hi); }
.seg button { border-radius: 9px; padding: 6px 13px; font-size: 13.5px; font-weight: 600; color: var(--text); }
.seg button.on { background: var(--glass-strong); box-shadow: 0 2px 8px rgba(0,0,0,.14), inset 0 1px 0 var(--glass-hi); }
.addbtn { width: 38px; height: 38px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(46,155,255,.9), rgba(10,132,255,.9));
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: .5px solid rgba(255,255,255,.45);
  box-shadow: 0 6px 18px rgba(10,132,255,.45), inset 0 1px 0 rgba(255,255,255,.5); }
.addbtn svg { width: 18px; height: 18px; }

/* ---------- Месяц ---------- */
.cal-grid { background: var(--card); border-radius: 18px; padding: 12px 8px; box-shadow: var(--shadow); }
.cal-wd { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
.cal-wd div { text-align: center; font-size: 11.5px; font-weight: 700; color: var(--text2); padding: 4px 0; }
.cal-days { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; }
.cal-cell .num { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 16px; font-weight: 500; }
.cal-cell.out .num { color: var(--text3); }
.cal-cell.today .num { background: var(--danger); color: #fff; font-weight: 800; }
.cal-cell.sel:not(.today) .num { background: var(--text); color: var(--bg); }
.dots { display: flex; gap: 2.5px; height: 6px; margin-top: 2px; }
.dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.day-panel { margin-top: 16px; }
.day-panel h3 { font-size: 17px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.3px; }
.ev-row { display: flex; gap: 12px; background: var(--card); border-radius: 16px; padding: 13px 15px; margin-bottom: 8px; box-shadow: var(--shadow-sm); cursor: pointer; }
.ev-row .bar { width: 4px; border-radius: 2px; background: var(--accent-grad); flex-shrink: 0; }
.ev-row .t { font-size: 15.5px; font-weight: 600; }
.ev-row .m { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* ---------- Сетка времени (День и Неделя) ---------- */
.tg-scroll { overflow: auto; background: var(--card); border-radius: 18px; box-shadow: var(--shadow); position: relative; scroll-behavior: smooth; }
.tg { display: grid; }
.tg.week { grid-template-columns: 50px repeat(7, minmax(104px, 1fr)); min-width: 778px; }
.tg.day { grid-template-columns: 50px 1fr; }
.tg-head { position: sticky; top: 0; z-index: 3; background: var(--card); border-bottom: .5px solid var(--sep2); text-align: center; padding: 9px 2px 7px; font-size: 11.5px; color: var(--text2); font-weight: 700; }
.tg-head.tcorner { position: sticky; left: 0; z-index: 4; }
.tg-head .dnum { font-size: 17px; font-weight: 800; color: var(--text); display: block; width: 30px; height: 30px; line-height: 30px; margin: 3px auto 0; border-radius: 50%; }
.tg-head.today .dnum { background: var(--danger); color: #fff; }
.tcol { position: sticky; left: 0; z-index: 2; background: var(--card); border-right: .5px solid var(--sep2); }
.hour-lbl { height: 52px; font-size: 10.5px; color: var(--text2); text-align: right; padding-right: 7px; transform: translateY(-6px); font-variant-numeric: tabular-nums; }
.day-col { border-left: .5px solid var(--sep); position: relative; }
.day-col:first-of-type { border-left: none; }
.day-col.today { background: rgba(10,132,255,.045); }
.hline { height: 52px; border-bottom: .5px solid var(--sep); }
.wev {
  position: absolute; left: 3px; right: 4px; background: linear-gradient(180deg,#2E9BFF,#0A84FF); color: #fff; border-radius: 9px;
  padding: 4px 8px; font-size: 12px; font-weight: 700; overflow: hidden; line-height: 1.3;
  box-shadow: 0 2px 8px rgba(10,132,255,.3); min-height: 24px; cursor: pointer;
}
.wev .wt { font-weight: 500; opacity: .85; font-size: 10.5px; }
.now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--danger); z-index: 1; pointer-events: none; }
.now-line::before { content: ""; position: absolute; left: -1px; top: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }

/* Лента дней недели (мобильный режим «Неделя», как в Apple Calendar) */
.wstrip { display: flex; gap: 2px; background: var(--glass); backdrop-filter: blur(22px) saturate(1.7); -webkit-backdrop-filter: blur(22px) saturate(1.7); border: .5px solid var(--glass-border); border-radius: 18px; padding: 8px 6px; margin-bottom: 10px; box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-hi); }
.wchip { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0 5px; border-radius: 12px; cursor: pointer; }
.wchip .wd { font-size: 10.5px; color: var(--text2); font-weight: 700; }
.wchip .dn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15.5px; transition: background .15s; }
.wchip.sel .dn { background: var(--text); color: var(--bg); }
.wchip.today .dn { background: var(--danger); color: #fff; }
.wchip .dots { height: 5px; margin-top: 0; }
.dots i.tk { background: var(--orange); }
.tcount { font-size: 10px; color: var(--orange); font-weight: 700; margin-top: 2px; }
.mini-task { display: flex; gap: 11px; align-items: center; padding: 7px 0; border-bottom: .5px solid var(--sep); }
.mini-task:last-child { border-bottom: none; }
.mini-task .checkbox { width: 22px; height: 22px; margin-top: 0; }
.mini-task .mt { flex: 1; font-size: 14.5px; font-weight: 600; cursor: pointer; }
.mini-task.done .mt { text-decoration: line-through; color: var(--text2); font-weight: 500; }
.mini-task .mp { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ---------- Задачи ---------- */
.task-row { display: flex; align-items: flex-start; gap: 13px; background: var(--card); border-radius: 16px; padding: 14px 15px; margin-bottom: 8px; box-shadow: var(--shadow-sm); }
.checkbox { width: 24px; height: 24px; border-radius: 50%; border: 1.8px solid var(--text3); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; color: #fff; margin-top: 1px; transition: all .2s; }
.checkbox svg { width: 13px; height: 13px; }
.checkbox.on { background: var(--accent-grad); border-color: transparent; }
.task-body { flex: 1; cursor: pointer; }
.task-row .t { font-size: 15.5px; font-weight: 600; }
.task-row.done .t { text-decoration: line-through; color: var(--text2); font-weight: 500; }
.task-row .m { font-size: 12.5px; color: var(--text2); margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.pill { font-size: 11px; font-weight: 700; padding: 2.5px 9px; border-radius: 9px; color: #fff; }
.overdue { color: var(--danger); font-weight: 700; }

  if (s === today) return "Сегодня"; if (s === tom) return "Завтра";

}

/* ====== Push-уведомления (работают при закрытом приложении) ====== */
const VAPID_PUBLIC = "BLguOC_uWIfXcM4Sm-waMHCb9jcCynV4hn0u6GBZJAt9OS2ZTSXBImxW7ByCgHk0FEADp-6ZLcmYETwPhn9r0ls";
function urlB64(s) {
  const pad = "=".repeat((4 - (s.length % 4)) % 4);
  const b64 = (s + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(b64); const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function enablePush() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window) || !location.protocol.startsWith("http")) {
    alert("Push недоступны: откройте сайт по вашей ссылке GitHub Pages.");
    return false;
  }
  const standalone = matchMedia("(display-mode: standalone)").matches || navigator.standalone;
  if (/iP(hone|ad|od)/.test(navigator.userAgent) && !standalone) {
    alert("На iPhone push работают только из установленного приложения: Поделиться → «На экран Домой», затем включите уведомления уже внутри LifeOS с рабочего стола.");
    return false;
  }
  const perm = await Notification.requestPermission();
  if (perm !== "granted") return false;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64(VAPID_PUBLIC) });
    const j = sub.toJSON();
    const { error } = await sb.from("push_subscriptions").upsert({
      endpoint: sub.endpoint,
      user_id: S.session.user.id,
      p256dh: j.keys.p256dh,
      auth: j.keys.auth,
      tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Moscow",
    }, { onConflict: "endpoint" });
    if (error) throw error;
    return true;
  } catch (e) {
    alert("Не удалось включить push: " + (e?.message || e));
    return false;
  }
}
async function disablePush() {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      await sb.from("push_subscriptions").delete().eq("endpoint", sub.endpoint);
      await sub.unsubscribe();
    }
  } catch {}
}
async function toggleNotif(on) {
  if (on) {
    const okRes = await enablePush();
    S.notifOn = okRes;
    localStorage.setItem("lifeos-notif", okRes ? "1" : "0");
    if (okRes) notify("LifeOS", "Push включены: напоминания за 10 минут и утренняя сводка в 8:00 — даже когда приложение закрыто.");
  } else {
    await disablePush();
    S.notifOn = false; localStorage.setItem("lifeos-notif","0");
  }
  render();
}
function notify(title, body, tag) {
  try {
    if (navigator.serviceWorker?.controller) {
      navigator.serviceWorker.controller.postMessage({ type:"notify", title, body, tag });
    } else if ("Notification" in window && Notification.permission === "granted") {
      new Notification(title, { body, icon: "./icon-192.png", tag });
    }
  } catch {}
}
const notified = new Set(JSON.parse(localStorage.getItem("lifeos-notified") || "[]"));
function checkReminders() {
  // Локальный дублёр: работает, только если серверные push выключены
  if (S.notifOn || !S.session || Notification.permission !== "granted") return;
  const n = new Date(); const today = fmtDate(n);
  for (const e of S.events) {
    if (e.date !== today || !e.time || notified.has(e.id)) continue;
    const [h, m] = e.time.split(":").map(Number);
    const diff = (h*60 + m) - (n.getHours()*60 + n.getMinutes());
    if (diff <= 10 && diff >= -1) {
      notify("Через " + Math.max(diff,0) + " мин: " + e.title, (hm(e.time) || "") + (e.location ? " · " + e.location : ""), e.id);
      notified.add(e.id);
      localStorage.setItem("lifeos-notified", JSON.stringify([...notified].slice(-200)));
    }
  }
}
setInterval(checkReminders, 45000);
matchMedia("(min-width: 900px)").addEventListener("change", () => render());

function renderView() {
  if (S.view === "dash") return viewDash();
  if (S.view === "chat") return viewChat();
  if (S.view === "calendar") return viewCalendar();
  if (S.view === "tasks") return viewTasks();
  if (S.view === "memory") return viewMemory();

/* --- Приветствие с именем --- */
function greeting() {
  const n = new Date(); const h = n.getHours();
  const base = h<5 ? "Доброй ночи" : h<12 ? "Доброе утро" : h<18 ? "Добрый день" : "Добрый вечер";
  const nm = S.name;
  if (!nm) return base + "!";
  const opts = [base + "!", `${base}, ${nm}!`, `${base}, ${nm}!`, `С возвращением, ${nm}!`, base + "!", `Рад видеть, ${nm}!`];
  if (h >= 8 && h < 18) opts.push(`Хорошего дня, ${nm}!`);
  const seed = n.getDate() * 7 + Math.floor(h / 3);
  return opts[seed % opts.length];
}

/* --- Рекомендации --- */
function buildRecs() {
  const n = new Date(); const today = fmtDate(n);
  const nowMin = n.getHours()*60 + n.getMinutes();
  const recs = [];
  const upcoming = S.events
    .filter((e) => e.date === today && e.time && (parseInt(e.time)*60 + parseInt(e.time.slice(3,5))) >= nowMin - 5)
    .sort((a,b) => a.time < b.time ? -1 : 1)[0];
  if (upcoming) recs.push({ ic:IC.clock, c:"#0A84FF", t:`Ближайшее: <b>${esc(upcoming.title)}</b> в ${hm(upcoming.time)}${upcoming.location ? " · " + esc(upcoming.location) : ""}` });
  const overdue = S.tasks.filter((t) => !t.done && t.due_date && t.due_date < today);
  if (overdue.length) recs.push({ ic:IC.warn, c:"#FF3B30", t:`Просрочено ${overdue.length}: начните с «${esc(overdue[0].title)}»` });
  const hi = S.tasks.filter((t) => !t.done && t.priority === "high" && (!t.due_date || t.due_date >= today));
  if (hi.length) recs.push({ ic:IC.bolt, c:"#FF9500", t:`Важное: <b>${esc(hi[0].title)}</b>${hi[0].due_date ? " — до " + humanDate(hi[0].due_date) : ""}` });
  const tom = fmtDate(new Date(Date.now()+864e5));
  const tomEv = S.events.filter((e) => e.date === tom).sort((a,b) => (a.time||"99")<(b.time||"99")?-1:1)[0];
  if (tomEv && recs.length < 3) recs.push({ ic:IC.flag, c:"#34C759", t:`Завтра: <b>${esc(tomEv.title)}</b>${tomEv.time ? " в " + hm(tomEv.time) : ""}` });
  if (!recs.length) recs.push({ ic:IC.bolt, c:"#0A84FF", t:`Расписание свободно. Скажите ассистенту «спланируй мою неделю» — он предложит план.` });
  return recs.slice(0, 3);
}

/* --- Дашборд --- */

  const todayEv = S.events.filter((e) => e.date===today).sort((a,b) => (a.time||"99")<(b.time||"99")?-1:1);
  const active = S.tasks.filter((t) => !t.done);
  const dueToday = active.filter((t) => t.due_date===today);
  const overdue = active.filter((t) => t.due_date && t.due_date<today);
  const weekAgo = fmtDate(new Date(Date.now()-7*864e5));
  const doneWeek = S.tasks.filter((t) => t.done && (t.updated_at||"").slice(0,10) >= weekAgo).length;
  const totalWeek = doneWeek + active.length;
  const pct = totalWeek ? Math.round(doneWeek/totalWeek*100) : 0;
  const recs = buildRecs();
  return `
    <div class="dash-greet">${esc(greeting())}</div>
    <div class="dash-date">${WD_FULL[n.getDay()][0].toUpperCase()+WD_FULL[n.getDay()].slice(1)}, ${n.getDate()} ${MONTHS_GEN[n.getMonth()]}</div>
    ${!S.name ? `
    <div class="card">
      <h3>Знакомство</h3>

    </div>` : ""}
    <div class="stat-row">
      <div class="stat"><div class="ico" style="background:linear-gradient(135deg,#2E9BFF,#0A84FF)">${IC.cal}</div><div class="num">${todayEv.length}</div><div class="lbl">событий сегодня</div></div>
      <div class="stat"><div class="ico" style="background:linear-gradient(135deg,#FFB340,#FF9500)">${IC.check}</div><div class="num">${dueToday.length}</div><div class="lbl">задач на сегодня</div></div>
      <div class="stat"><div class="ico" style="background:linear-gradient(135deg,${overdue.length?"#FF6B61,#FF3B30":"#30D158,#34C759"})">${overdue.length ? IC.warn : IC.tick}</div><div class="num">${overdue.length}</div><div class="lbl">просрочено</div></div>
    </div>
    <div class="card">
      <h3>Рекомендации</h3>
      ${recs.map((r) => `<div class="rec-row"><div class="ri" style="background:${r.c}">${r.ic}</div><div>${r.t}</div></div>`).join("")}
    </div>
    <div class="card">
      <h3>Расписание на сегодня</h3>
      ${todayEv.length ? todayEv.map((e) => `
        <div class="dash-ev"><div class="tm">${hm(e.time)||"—"}</div><div><div class="tt">${esc(e.title)}</div>${e.location?`<div class="loc">${esc(e.location)}</div>`:""}</div></div>`).join("") : '<div class="empty">Свободный день. Хороший повод для важного.</div>'}
    </div>
    <div class="card">
      <h3>Прогресс за неделю</h3>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px"><span>Выполнено ${doneWeek} из ${totalWeek}</span><span>${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="notif-row">
        <div><div class="txt">Push-уведомления</div><div class="st">Напоминания за 10 мин и сводка в 8:00 — даже когда LifeOS закрыт</div></div>
        <label class="switch"><input type="checkbox" id="notif" ${S.notifOn?"checked":""}><span class="knob"></span></label>
      </div>
    </div>
    <div style="text-align:center;color:var(--text3);font-size:11px;font-weight:600;margin:2px 0 10px">LifeOS v4.0 · Liquid Glass</div>
    <button class="plan-btn" data-plan>${IC.spark.replace('class="nic"','class="nic" style="width:18px;height:18px"')} Спланируй мой день</button>`;
}

/* --- Чат --- */

  if (!S.chat.length) {
    h += `<div class="bubble ai">Привет${S.name ? ", " + esc(S.name) : ""}! Я ваш ассистент в LifeOS: веду календарь, задачи и помню важное о вас. С чего начнём?</div>
    <div class="suggest">
      ${["Запланируй встречу завтра в 15:00","Добавь задачу: купить продукты","Что у меня на этой неделе?"].map((s) => `<button data-suggest="${esc(s)}">${esc(s)}</button>`).join("")}
    </div>`;

  for (const m of S.chat) {
    h += `<div class="bubble ${m.role==="user"?"user":"ai"}">${esc(m.text)}</div>`;
    for (const c of m.chips || []) h += `<div class="chip"><span>${c.i}</span><span>${esc(c.t)}</span></div>`;

/* --- Календарь --- */
function viewCalendar() {
  if (S.calMode === "day") S.calMode = "week";
  const seg = `<div class="seg">
    <button data-mode="week" class="${S.calMode==="week"?"on":""}">Неделя</button>
    <button data-mode="month" class="${S.calMode==="month"?"on":""}">Месяц</button>
  </div>`;
  if (S.calMode === "month") return calMonthView(seg);
  return calWeekView(seg);
}

const isDesktop = () => matchMedia("(min-width: 900px)").matches;

/* Задачи, привязанные к дню, — карточка со встроенными чекбоксами */
function dayTasksHtml(k) {
  const ts = S.tasks.filter((t) => t.due_date === k);
  if (!ts.length) return "";
  ts.sort((a, b) => (a.done === b.done ? 0 : a.done ? 1 : -1));
  return `<div class="card" style="padding:12px 16px;margin-bottom:10px">
    <h3 style="margin-bottom:4px">Задачи на этот день</h3>
    ${ts.map((t) => `
      <div class="mini-task ${t.done ? "done" : ""}">
        <div class="checkbox ${t.done ? "on" : ""}" data-task="${t.id}">${t.done ? IC.tick : ""}</div>
        <div class="mt" data-edittask="${t.id}">${esc(t.title)}</div>
        <div class="mp" style="background:${prioColor[t.priority] || "#8E8E93"}"></div>
      </div>`).join("")}
  </div>`;
}

function calMonthView(seg) {
  const today = fmtDate(new Date());
  const first = new Date(S.calMonth.y, S.calMonth.m, 1);
  const start = new Date(S.calMonth.y, S.calMonth.m, 1 - ((first.getDay()+6)%7));
  const byDate = {};
  for (const e of S.events) (byDate[e.date] = byDate[e.date] || []).push(e);
  const tByDate = {};
  for (const t of S.tasks) if (t.due_date && !t.done) tByDate[t.due_date] = (tByDate[t.due_date] || 0) + 1;
  let cells = "";
  for (let i=0;i<42;i++){
    const d = new Date(start.getFullYear(), start.getMonth(), start.getDate()+i);
    const k = fmtDate(d);
    const cnt = Math.min((byDate[k]||[]).length, 3);
    const tcnt = Math.min(tByDate[k] || 0, 4 - cnt);
    cells += `<div class="cal-cell ${d.getMonth()===S.calMonth.m?"":"out"} ${k===today?"today":""} ${k===S.selectedDay?"sel":""}" data-day="${k}">
      <div class="num">${d.getDate()}</div><div class="dots">${"<i></i>".repeat(cnt)}${'<i class="tk"></i>'.repeat(Math.max(0,tcnt))}</div></div>`;
  }
  const dayEv = (byDate[S.selectedDay]||[]).sort((a,b) => (a.time||"99")<(b.time||"99")?-1:1);
  const sd = parseDate(S.selectedDay);
  return `
    <div class="cal-head">
      <div class="cal-title">${MONTHS[S.calMonth.m]}<span class="yr">${S.calMonth.y}</span></div>
      ${seg}
      <div class="cal-nav"><button data-cal="-1">‹</button><button class="today-btn" data-cal="0">Сегодня</button><button data-cal="1">›</button><button class="addbtn" data-newev>${IC.plus}</button></div>
    </div>
    <div class="cal-grid">
      <div class="cal-wd">${WD.map((w)=>`<div>${w}</div>`).join("")}</div>
      <div class="cal-days">${cells}</div>
    </div>
    <div class="day-panel">
      <h3>${humanDate(S.selectedDay)}${humanDate(S.selectedDay).length<8 ? `, ${sd.getDate()} ${MONTHS_GEN[sd.getMonth()]}` : ""}</h3>
      ${dayTasksHtml(S.selectedDay)}
      ${dayEv.length ? dayEv.map((e) => `
        <div class="ev-row" data-ev="${e.id}"><div class="bar"></div><div style="flex:1">
          <div class="t">${esc(e.title)}</div>
          <div class="m">${hm(e.time)||"Весь день"}${e.duration_min?` · ${e.duration_min} мин`:""}${e.location?` · ${esc(e.location)}`:""}</div>
          ${e.notes?`<div class="m">${esc(e.notes)}</div>`:""}
        </div></div>`).join("") : '<div class="empty-card">Нет событий. Нажмите ＋ или попросите ассистента.</div>'}
    </div>`;
}

function timeGrid(days, mode) {
  const H0=6, H1=23, PX=52;
  const today = fmtDate(new Date());
  const n = new Date();
  let head = `<div class="tg-head tcorner"></div>`;
  for (const d of days) {
    const k = fmtDate(d);
    const tn = S.tasks.filter((t) => t.due_date === k && !t.done).length;
    head += `<div class="tg-head ${k===today?"today":""}">${WD[(d.getDay()+6)%7]}<span class="dnum">${d.getDate()}</span>${mode==="week" && tn ? `<div class="tcount">${tn} задач${tn===1?"а":tn<5?"и":""}</div>` : ""}</div>`;
  }
  let hourCol = `<div class="tcol">`;
  for (let h=H0;h<=H1;h++) hourCol += `<div class="hour-lbl" style="height:${PX}px">${pad(h)}:00</div>`;
  hourCol += `</div>`;
  let cols = "";
  for (const d of days) {
    const k = fmtDate(d);
    const evs = S.events.filter((e) => e.date===k && e.time);
    let blocks = "";
    for (const e of evs) {
      const [hh,mm] = e.time.split(":").map(Number);
      if (hh > H1) continue;
      const top = Math.max(0, (hh-H0)*PX + (mm/60)*PX);
      const height = Math.max(26, ((e.duration_min||60)/60)*PX - 3);
      blocks += `<div class="wev" data-ev="${e.id}" style="top:${top}px;height:${height}px">${esc(e.title)}<div class="wt">${hm(e.time)}${e.location ? " · " + esc(e.location) : ""}</div></div>`;
    }
    let nowLine = "";
    if (k===today && n.getHours()>=H0 && n.getHours()<=H1) {
      nowLine = `<div class="now-line" style="top:${(n.getHours()-H0)*PX + (n.getMinutes()/60)*PX}px"></div>`;
    }
    cols += `<div class="day-col ${k===today?"today":""}" style="height:${(H1-H0+1)*PX}px">${'<div class="hline"></div>'.repeat(H1-H0+1)}${blocks}${nowLine}</div>`;
  }
  const allDay = S.events.filter((e) => !e.time && days.some((d)=>fmtDate(d)===e.date));
  return `
    ${allDay.length ? `<div class="card" style="padding:12px 16px;margin-bottom:10px"><h3 style="margin-bottom:6px">Весь день</h3>${allDay.map((e)=>`<div data-ev="${e.id}" style="font-size:14.5px;font-weight:500;padding:4px 0;cursor:pointer">📌 ${esc(e.title)} — ${humanDate(e.date)}</div>`).join("")}</div>` : ""}
    <div class="tg-scroll" style="max-height:calc(100dvh - ${mode==="week" ? "300" : "360"}px)">
      <div class="tg ${mode}">
        ${head}
        ${hourCol}${cols}
      </div>
    </div>`;
}

function weekDays() {
  const days = [];
  for (let i=0;i<7;i++) days.push(new Date(S.weekStart.getFullYear(), S.weekStart.getMonth(), S.weekStart.getDate()+i));
  return days;
}

function calWeekView(seg) {
  const days = weekDays();
  const today = fmtDate(new Date());
  // выбранный день всегда внутри показанной недели
  if (S.selectedDay < fmtDate(days[0]) || S.selectedDay > fmtDate(days[6])) {
    S.selectedDay = (today >= fmtDate(days[0]) && today <= fmtDate(days[6])) ? today : fmtDate(days[0]);
  }
  const last = days[6];
  const nav = `<div class="cal-nav"><button data-week="-1">‹</button><button class="today-btn" data-week="0">Сегодня</button><button data-week="1">›</button><button class="addbtn" data-newev>${IC.plus}</button></div>`;

  if (isDesktop()) {
    const rangeTitle = `${days[0].getDate()} ${MONTHS_GEN[days[0].getMonth()]} — ${last.getDate()} ${MONTHS_GEN[last.getMonth()]}`;
    return `
      <div class="cal-head"><div class="cal-title">${rangeTitle}</div>${seg}${nav}</div>
      ${timeGrid(days, "week")}`;
  }

  // Мобильный режим: лента дней недели + один день крупно (паттерн Apple Calendar)
  const byDate = {}; for (const e of S.events) (byDate[e.date] = byDate[e.date] || []).push(e);
  const tByDate = {}; for (const t of S.tasks) if (t.due_date && !t.done) tByDate[t.due_date] = (tByDate[t.due_date] || 0) + 1;
  const strip = `<div class="wstrip">` + days.map((d) => {
    const k = fmtDate(d);
    const ec = Math.min((byDate[k]||[]).length, 2);
    const tc = Math.min(tByDate[k]||0, 3-ec);
    return `<div class="wchip ${k===S.selectedDay?"sel":""} ${k===today?"today":""}" data-day="${k}">
      <div class="wd">${WD[(d.getDay()+6)%7]}</div><div class="dn">${d.getDate()}</div>
      <div class="dots">${"<i></i>".repeat(ec)}${'<i class="tk"></i>'.repeat(Math.max(0,tc))}</div>
    </div>`;
  }).join("") + `</div>`;
  const sd = parseDate(S.selectedDay);
  const dayTitle = `${WD_FULL[sd.getDay()][0].toUpperCase()+WD_FULL[sd.getDay()].slice(1)}, ${sd.getDate()} ${MONTHS_GEN[sd.getMonth()]}`;
  return `
    <div class="cal-head"><div class="cal-title">${dayTitle}</div>${seg}${nav}</div>
    ${strip}
    ${dayTasksHtml(S.selectedDay)}
    ${timeGrid([sd], "day")}`;
}

function shiftDay(v) {
  const d = parseDate(S.selectedDay);
  d.setDate(d.getDate() + v);
  S.selectedDay = fmtDate(d);
  const ws = fmtDate(S.weekStart), we = fmtDate(weekDays()[6]);
  if (S.selectedDay < ws || S.selectedDay > we) S.weekStart = mondayOf(d);
  render();
}

/* --- Задачи --- */
function viewTasks() {
  const today = fmtDate(new Date());
  const act = S.tasks.filter((t)=>!t.done); const done = S.tasks.filter((t)=>t.done);
  const toolbar = `<div class="list-toolbar"><button class="new-btn" data-newtask>${IC.plus} Новая задача</button></div>`;
  if (!S.tasks.length) return toolbar + '<div class="empty-card">Задач пока нет. Добавьте вручную или скажите ассистенту.</div>';
  const row = (t) => `
    <div class="task-row ${t.done?"done":""}">
      <div class="checkbox ${t.done?"on":""}" data-task="${t.id}">${t.done ? IC.tick : ""}</div>
      <div class="task-body" data-edittask="${t.id}">
        <div class="t">${esc(t.title)}</div>
        ${t.done ? "" : `<div class="m">
          <span class="pill" style="background:${prioColor[t.priority]||"#8E8E93"}">${prioLabel[t.priority]||esc(t.priority)}</span>
          ${t.due_date ? `<span class="${t.due_date<today?"overdue":""}">до ${humanDate(t.due_date)}</span>` : ""}
          ${t.notes ? `<span>${esc(t.notes)}</span>` : ""}
        </div>`}
      </div>
    </div>`;
  return toolbar + act.map(row).join("") + (done.length ? `<div class="section-label">Выполнено</div>` + done.map(row).join("") : "");
}

/* --- Память --- */
function viewMemory() {
  if (!S.memories.length) return '<div class="empty-card">Память пуста. Ассистент запоминает важное сам — или скажите: «запомни, что…»</div>';
  return S.memories.map((m) => `
    <div class="mem-row">
      <div style="flex:1"><div class="f">${esc(m.fact)}</div><div class="c">${catLabel[m.category]||esc(m.category)} · ${(m.created_at||"").slice(0,10)}</div></div>
      <button class="forget" data-forget="${m.id}">Забыть</button>
    </div>`).join("");
}

/* --- Шторка редактирования --- */
function renderModal() {
  const m = S.modal;
  if (m.type === "event") {
    const e = m.data;
    return `
    <div class="overlay" id="overlay">
      <div class="sheet" id="sheet">
        <h2>${e.id ? "Событие" : "Новое событие"}</h2>
        <div class="frow"><label>Название</label><input class="finput" id="f-title" value="${esc(e.title||"")}" placeholder="Например: Встреча с командой"></div>
        <div class="fgrid">
          <div class="frow"><label>Дата</label><input class="finput" id="f-date" type="date" value="${esc(e.date||S.selectedDay)}"></div>
          <div class="frow"><label>Время</label><input class="finput" id="f-time" type="time" value="${esc(hm(e.time)||"")}"></div>
        </div>
        <div class="fgrid">
          <div class="frow"><label>Длительность, мин</label><input class="finput" id="f-dur" type="number" min="5" step="5" value="${e.duration_min||""}" placeholder="60"></div>
          <div class="frow"><label>Место</label><input class="finput" id="f-loc" value="${esc(e.location||"")}" placeholder="Офис, Zoom…"></div>
        </div>
        <div class="frow"><label>Заметки</label><input class="finput" id="f-notes" value="${esc(e.notes||"")}" placeholder="Детали"></div>
        <div class="sheet-actions">
          <button class="btn-primary" id="m-save">Сохранить</button>
          ${e.id ? `<button class="btn-danger" id="m-del">Удалить событие</button>` : ""}
          <button class="btn-ghost" id="m-cancel">Отмена</button>
        </div>
      </div>
    </div>`;
  }
  const t = m.data;
  return `
  <div class="overlay" id="overlay">
    <div class="sheet" id="sheet">
      <h2>${t.id ? "Задача" : "Новая задача"}</h2>
      <div class="frow"><label>Название</label><input class="finput" id="f-title" value="${esc(t.title||"")}" placeholder="Что нужно сделать?"></div>
      <div class="fgrid">
        <div class="frow"><label>Приоритет</label>
          <select class="finput" id="f-prio">
            <option value="high" ${t.priority==="high"?"selected":""}>Высокий</option>
            <option value="medium" ${!t.priority||t.priority==="medium"?"selected":""}>Средний</option>
            <option value="low" ${t.priority==="low"?"selected":""}>Низкий</option>
          </select>
        </div>
        <div class="frow"><label>Срок</label><input class="finput" id="f-due" type="date" value="${esc(t.due_date||"")}"></div>
      </div>
      <div class="frow"><label>Заметки</label><input class="finput" id="f-notes" value="${esc(t.notes||"")}" placeholder="Детали"></div>
      <div class="sheet-actions">
        <button class="btn-primary" id="m-save">Сохранить</button>
        ${t.id ? `<button class="btn-danger" id="m-del">Удалить задачу</button>` : ""}
        <button class="btn-ghost" id="m-cancel">Отмена</button>
      </div>
    </div>
  </div>`;
}
function openEvent(ev) { S.modal = { type:"event", data: ev || {} }; render(); }
function openTask(t) { S.modal = { type:"task", data: t || {} }; render(); }
async function saveModal() {
  const m = S.modal; if (!m) return;
  const uid = S.session.user.id;
  const title = ($("#f-title")?.value || "").trim();
  if (!title) { $("#f-title").focus(); return; }
  if (m.type === "event") {
    const row = {
      title,
      date: $("#f-date").value || fmtDate(new Date()),
      time: $("#f-time").value || null,
      duration_min: parseInt($("#f-dur").value) || null,
      location: ($("#f-loc").value || "").trim() || null,
      notes: ($("#f-notes").value || "").trim() || null,
    };
    if (m.data.id) await sb.from("events").update(row).eq("id", m.data.id);
    else await sb.from("events").insert({ ...row, user_id: uid });
  } else {
    const row = {
      title,
      priority: $("#f-prio").value,
      due_date: $("#f-due").value || null,
      notes: ($("#f-notes").value || "").trim() || null,
    };
    if (m.data.id) await sb.from("tasks").update(row).eq("id", m.data.id);
    else await sb.from("tasks").insert({ ...row, user_id: uid });
  }
  S.modal = null;
  await loadAll();
  render();
}
async function deleteModal() {
  const m = S.modal; if (!m || !m.data.id) return;
  if (!confirm(m.type === "event" ? "Удалить это событие?" : "Удалить эту задачу?")) return;
  await sb.from(m.type === "event" ? "events" : "tasks").delete().eq("id", m.data.id);
  S.modal = null;
  await loadAll();
  render();
}

/* ====== Авторизация ====== */
function renderAuth() {
  const isLogin = S.authMode === "login";
  app.innerHTML = `
    <div class="auth-wrap">
      <img class="auth-icon" src="./icon-192.png" alt="" onerror="this.style.display='none'">
      <div class="auth-logo">Life<em>OS</em></div>
      <div class="auth-sub">Ваш личный AI-ассистент</div>
      <div class="auth-card">
        <input id="email" type="email" placeholder="Email" autocomplete="email">
        <input id="pass" type="password" placeholder="Пароль (минимум 6 символов)" autocomplete="${isLogin?"current-password":"new-password"}">
        <div class="auth-error">${esc(S.authError)}</div>
        <button class="btn-primary" id="authbtn" ${S.authBusy?"disabled":""}>${S.authBusy?"Секунду…":isLogin?"Войти":"Создать аккаунт"}</button>
      </div>
      <div class="auth-switch">${isLogin ? 'Нет аккаунта? <a data-switch>Зарегистрироваться</a>' : 'Уже есть аккаунт? <a data-switch>Войти</a>'}</div>
    </div>`;
  $("#authbtn").onclick = doAuth;
  $("#pass").onkeydown = (e) => { if (e.key==="Enter") doAuth(); };
  $("[data-switch]").onclick = () => { S.authMode = isLogin ? "signup" : "login"; S.authError=""; renderAuth(); };
}
async function doAuth() {
  const email = $("#email").value.trim(); const password = $("#pass").value;
  if (!email || password.length < 6) { S.authError = "Введите email и пароль от 6 символов."; renderAuth(); return; }
  S.authBusy = true; S.authError = ""; renderAuth();
  const { data, error } = await (S.authMode==="login"
    ? sb.auth.signInWithPassword({ email, password })
    : sb.auth.signUp({ email, password }));
  S.authBusy = false;
  if (error) { S.authError = /invalid/i.test(error.message) ? "Неверный email или пароль." : error.message; renderAuth(); return; }
  if (!data.session) { S.authError = "Подтвердите email по ссылке из письма и войдите."; S.authMode="login"; renderAuth(); }
}

/* ====== Обработчики ====== */
function bindMain() {
  $$("[data-nav]").forEach((b)=>(b.onclick=()=>{ S.view=b.dataset.nav; S.modal=null; render(); }));
  $$("[data-signout]").forEach((b)=>(b.onclick=async()=>{ await sb.auth.signOut(); }));
  const send = $("#send"); if (send) send.onclick = () => sendMsg();
  const msg = $("#msg"); if (msg) msg.onkeydown = (e)=>{ if (e.key==="Enter") sendMsg(); };
  const mic = $("#mic"); if (mic) mic.onclick = toggleMic;
  $$("[data-suggest]").forEach((b)=>(b.onclick=()=>sendMsg(b.dataset.suggest)));
  const plan = $("[data-plan]"); if (plan) plan.onclick = () => { S.view="chat"; render(); sendMsg("Спланируй мой день с учётом моих событий и задач"); };
  const nt = $("#notif"); if (nt) nt.onchange = () => toggleNotif(nt.checked);
  const sn = $("#savename");
  if (sn) sn.onclick = async () => {
    const v = ($("#uname").value || "").trim();
    if (!v) return;
    S.name = v;
    localStorage.setItem("lifeos-name", v);
    try { await sb.auth.updateUser({ data: { name: v } }); } catch {}
    render();
  };
  $$("[data-mode]").forEach((b)=>(b.onclick=()=>{ S.calMode=b.dataset.mode; render(); }));
  $$("[data-cal]").forEach((b)=>(b.onclick=()=>{
    const v = +b.dataset.cal;
    if (v===0) { const n=new Date(); S.calMonth={y:n.getFullYear(),m:n.getMonth()}; S.selectedDay=fmtDate(n); }
    else { const d=new Date(S.calMonth.y, S.calMonth.m+v, 1); S.calMonth={y:d.getFullYear(),m:d.getMonth()}; }
    render();
  }));
  $$("[data-week]").forEach((b)=>(b.onclick=()=>{
    const v = +b.dataset.week;
    if (v===0) { S.weekStart = mondayOf(new Date()); S.selectedDay = fmtDate(new Date()); }
    else {
      S.weekStart = new Date(S.weekStart.getFullYear(), S.weekStart.getMonth(), S.weekStart.getDate()+v*7);
      const d = parseDate(S.selectedDay); d.setDate(d.getDate()+v*7); S.selectedDay = fmtDate(d);
    }
    render();
  }));
  // Свайп влево/вправо по сетке дня = следующий/предыдущий день (мобильная «Неделя»)
  const tgs = $(".tg-scroll");
  if (tgs && S.view==="calendar" && S.calMode==="week" && !isDesktop()) {
    let sx=0, sy=0;
    tgs.addEventListener("touchstart",(e)=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
    tgs.addEventListener("touchend",(e)=>{
      const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
      if (Math.abs(dx)>60 && Math.abs(dy)<50) shiftDay(dx<0?1:-1);
    },{passive:true});
  }
  $$("[data-day]").forEach((c)=>(c.onclick=()=>{ S.selectedDay=c.dataset.day; render(); }));
  $$("[data-ev]").forEach((el)=>(el.onclick=()=>{
    const ev = S.events.find((x)=>x.id===el.dataset.ev);
    if (ev) openEvent({ ...ev });
  }));
  $$("[data-newev]").forEach((b)=>(b.onclick=()=>openEvent(null)));
  $$("[data-newtask]").forEach((b)=>(b.onclick=()=>openTask(null)));
  $$("[data-edittask]").forEach((el)=>(el.onclick=()=>{
    const t = S.tasks.find((x)=>x.id===el.dataset.edittask);
    if (t) openTask({ ...t });
  }));
  $$("[data-task]").forEach((c)=>(c.onclick=async()=>{
    const t = S.tasks.find((x)=>x.id===c.dataset.task); if (!t) return;
    t.done = !t.done; render();
    await sb.from("tasks").update({ done: t.done }).eq("id", t.id);
    loadAll(true);
  }));
  $$("[data-forget]").forEach((b)=>(b.onclick=async()=>{
    S.memories = S.memories.filter((m)=>m.id!==b.dataset.forget); render();
    await sb.from("memories").delete().eq("id", b.dataset.forget);
    loadAll();
  }));
  const ov = $("#overlay");
  if (ov) {
    ov.onclick = (e) => { if (e.target === ov) { S.modal = null; render(); } };
    $("#m-save").onclick = saveModal;
    $("#m-cancel").onclick = () => { S.modal = null; render(); };
    const del = $("#m-del"); if (del) del.onclick = deleteModal;
  }
}

/* ====== Старт ====== */
sb.auth.onAuthStateChange(async (_e, session) => {
  const had = !!S.session; S.session = session;
  if (session && !had) {
    if (!S.name && session.user?.user_metadata?.name) { S.name = session.user.user_metadata.name; localStorage.setItem("lifeos-name", S.name); }
    loadChat(); hydrateFromCache(); render(); loadAll(true);
  }
  else render();
});
(async () => {
  const { data } = await sb.auth.getSession();
  S.session = data.session;
  if (S.session) {
    if (!S.name && S.session.user?.user_metadata?.name) { S.name = S.session.user.user_metadata.name; localStorage.setItem("lifeos-name", S.name); }
    loadChat(); hydrateFromCache(); render(); loadAll(true);
  }
  else render();
})();
</script>
